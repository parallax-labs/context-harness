# Context Harness config for developing context-harness itself.
# Run from repo root: ctx sync all && ctx serve
# MCP/Cursor: point at http://127.0.0.1:7332

[db]
path = ".ctx/data/ctx.sqlite"

[chunking]
max_tokens = 700
overlap_tokens = 80

[embedding]
provider = "local"
model = "all-minilm-l6-v2"
# dims = 384  # default for all-minilm-l6-v2

[retrieval]
final_limit = 12
hybrid_alpha = 0.6
candidate_k_keyword = 80
candidate_k_vector = 80
group_by = "document"
doc_agg = "max"
max_chunks_per_doc = 3

[server]
bind = "127.0.0.1:7332"

# ── Project docs (design, usage, internal) ─────────────────────

[connectors.filesystem.docs]
root = "./docs"
include_globs = ["**/*.md"]
exclude_globs = []
follow_symlinks = false

# ── Published site (docs + blog) ───────────────────────────────

[connectors.filesystem.site]
root = "./site/content"
include_globs = ["**/*.md"]
exclude_globs = []
follow_symlinks = false

# ── Repo root (README, CONTRIBUTING, CHANGELOG) ───────────────────

[connectors.filesystem.root]
root = "."
include_globs = ["README.md", "CONTRIBUTING.md", "CHANGELOG.md"]
exclude_globs = []
follow_symlinks = false

# ── Rust source (for implementation reference) ───────────────────

[connectors.filesystem.src]
root = "./crates"
include_globs = ["**/*.rs"]
exclude_globs = ["**/target/**"]
follow_symlinks = false

# ── Documentation Agents (the "doc company") ─────────────────────
#
# A coordinated team of agents that manage the five-layer doc
# hierarchy: PRD → ADR → Spec → Design → Runbook.

[agents.script.doc-coordinator]
path = "agents/doc-coordinator.lua"
search_limit = "12"

[agents.script.prd-writer]
path = "agents/prd-writer.lua"
search_limit = "8"

[agents.script.adr-writer]
path = "agents/adr-writer.lua"
search_limit = "8"

[agents.script.spec-writer]
path = "agents/spec-writer.lua"
search_limit = "10"

[agents.script.design-writer]
path = "agents/design-writer.lua"
search_limit = "8"

[agents.script.runbook-writer]
path = "agents/runbook-writer.lua"
search_limit = "8"

# ── Registry ──────────────────────────────────────────────────────

[registries.community]
url = "https://github.com/parallax-labs/ctx-registry.git"
branch = "main"
path = "~/.local/share/ctx/registries/community"
readonly = true
auto_update = true
